# ─────────────────────────────────────────────────────────────────────────────
# SonarCloud configuration for MediSync Backend (monorepo)
# ─────────────────────────────────────────────────────────────────────────────

sonar.projectKey=JAPV-X2612_medi-sync-backend
sonar.organization=japv-x2612
sonar.projectName=medi-sync-backend
sonar.projectVersion=1.0

# ─── Source code ──────────────────────────────────────────────────────────────
sonar.sources=\
  services/patient-service/src,\
  services/doctor-service/src,\
  services/appointments-service/src,\
  services/api-gateway/src

sonar.exclusions=\
  **/node_modules/**,\
  **/dist/**,\
  **/coverage/**,\
  **/*.d.ts,\
  **/*.js,\
  services/auth-service/**

# ─── Test files ───────────────────────────────────────────────────────────────
sonar.test.inclusions=**/*.spec.ts,**/*.e2e-spec.ts

# ─── Coverage (lcov reports generated by Jest --coverage) ────────────────────
sonar.javascript.lcov.reportPaths=\
  services/patient-service/coverage/lcov.info,\
  services/doctor-service/coverage/lcov.info,\
  services/appointments-service/coverage/lcov.info,\
  services/api-gateway/coverage/lcov.info

# ─── TypeScript tsconfig discovery ───────────────────────────────────────────
sonar.typescript.tsconfigPath=\
  services/patient-service/tsconfig.json,\
  services/doctor-service/tsconfig.json,\
  services/appointments-service/tsconfig.json,\
  services/api-gateway/tsconfig.json
