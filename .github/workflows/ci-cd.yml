name: CI/CD — MediSync Backend

on:
  push:
    branches: [main, staging, development]
  pull_request:
    branches: [main, staging, development]

jobs:

  # ─────────────────────────────────────────────────────────────────────────
  # Stage 1 — Build & Test
  # Runs for each service in parallel. Produces lcov coverage reports as
  # artifacts consumed by the SonarCloud stage.
  # ─────────────────────────────────────────────────────────────────────────
  build-and-test:
    name: Build & Test — ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - patient-service
          - doctor-service
          - appointments-service
          - api-gateway
    defaults:
      run:
        working-directory: services/${{ matrix.service }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: services/${{ matrix.service }}/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Build — TypeScript compilation
        run: npm run build

      - name: Test — Jest with coverage
        run: npm run test:cov

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.service }}
          path: services/${{ matrix.service }}/coverage/lcov.info
          if-no-files-found: warn
          retention-days: 1

  # ─────────────────────────────────────────────────────────────────────────
  # Stage 2 — Static Analysis with SonarCloud
  # Runs after all build-and-test jobs pass. Downloads the four lcov reports
  # and submits everything to SonarCloud for quality gate evaluation.
  # ─────────────────────────────────────────────────────────────────────────
  sonarcloud:
    name: SonarCloud Analysis
    needs: build-and-test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (full history for blame annotations)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download coverage — patient-service
        uses: actions/download-artifact@v4
        with:
          name: coverage-patient-service
          path: services/patient-service/coverage

      - name: Download coverage — doctor-service
        uses: actions/download-artifact@v4
        with:
          name: coverage-doctor-service
          path: services/doctor-service/coverage

      - name: Download coverage — appointments-service
        uses: actions/download-artifact@v4
        with:
          name: coverage-appointments-service
          path: services/appointments-service/coverage

      - name: Download coverage — api-gateway
        uses: actions/download-artifact@v4
        with:
          name: coverage-api-gateway
          path: services/api-gateway/coverage

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # ─────────────────────────────────────────────────────────────────────────
  # Stage 3 — Deploy
  # Builds Docker images and pushes them to GitHub Container Registry (ghcr.io).
  # Runs only on pushes to main after SonarCloud passes.
  # Images are tagged :latest and :<git-sha> for traceability.
  # ─────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy — ${{ matrix.service }}
    needs: sonarcloud
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        service:
          - patient-service
          - doctor-service
          - appointments-service
          - api-gateway

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push — ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: services/${{ matrix.service }}
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/medisync-${{ matrix.service }}:latest
            ghcr.io/${{ github.repository_owner }}/medisync-${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,scope=${{ matrix.service }},mode=max
